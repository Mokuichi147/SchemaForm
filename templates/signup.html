{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="text-2xl font-semibold">アカウント作成</h1>
  <p class="mt-1 text-sm text-slate-600">新しいアカウントの情報を入力してください。</p>

  {% if errors %}
  <div class="mt-4 rounded border border-rose-300 bg-rose-50 p-3 text-sm text-rose-700">
    <ul class="list-disc space-y-1 pl-5">
      {% for error in errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}

  <form method="post" action="/signup" class="mt-6 space-y-4 rounded-lg border border-slate-200 bg-white p-6">
    <input type="hidden" name="next" value="{{ next }}" />
    <div>
      <label class="text-xs font-semibold text-slate-600" for="username">ユーザーID</label>
      <input id="username" name="username" value="{{ username }}" required autofocus
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-600" for="display_name">ユーザー名（任意）</label>
      <input id="display_name" name="display_name" value="{{ display_name }}"
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-600" for="password">パスワード（8 文字以上）</label>
      <input id="password" name="password" type="password" required minlength="8"
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-600" for="password_confirm">パスワード（確認）</label>
      <input id="password_confirm" name="password_confirm" type="password" required minlength="8"
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div class="flex items-center justify-between">
      <a href="/login" class="text-sm text-slate-600 hover:underline">ログインへ戻る</a>
      <button type="submit" class="rounded bg-slate-900 px-4 py-2 text-sm font-semibold text-white">
        アカウント作成
      </button>
    </div>
  </form>
</div>
{% endblock %}
