{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="text-2xl font-semibold">パスワード変更</h1>

  {% if notice %}
  <div class="mt-4 rounded border border-emerald-300 bg-emerald-50 p-3 text-sm text-emerald-700">
    {{ notice }}
  </div>
  {% endif %}

  {% if errors %}
  <div class="mt-4 rounded border border-rose-300 bg-rose-50 p-3 text-sm text-rose-700">
    <ul class="list-disc space-y-1 pl-5">
      {% for error in errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}

  <form method="post" action="/account/password" class="mt-6 space-y-4 rounded-lg border border-slate-200 bg-white p-6">
    <div>
      <label class="text-xs font-semibold text-slate-600" for="current_password">現パスワード</label>
      <input id="current_password" name="current_password" type="password" required autofocus
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-600" for="new_password">新パスワード</label>
      <input id="new_password" name="new_password" type="password" required minlength="8"
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
      <p class="mt-1 text-xs text-slate-500">8 文字以上で入力してください。</p>
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-600" for="new_password_confirm">新パスワード（確認）</label>
      <input id="new_password_confirm" name="new_password_confirm" type="password" required minlength="8"
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div class="flex justify-end">
      <button type="submit" class="rounded bg-slate-900 px-4 py-2 text-sm font-semibold text-white">
        変更する
      </button>
    </div>
  </form>
</div>
{% endblock %}
