{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="text-2xl font-semibold">ユーザー設定</h1>

  <dl class="mt-6 grid grid-cols-[auto_1fr] gap-x-4 gap-y-2 rounded-lg border border-slate-200 bg-white p-6 text-sm">
    <dt class="font-semibold text-slate-600">ユーザーID</dt>
    <dd>{{ user.username }}</dd>
    <dt class="font-semibold text-slate-600">ユーザー名</dt>
    <dd>{{ user.display_name or "—" }}</dd>
    <dt class="font-semibold text-slate-600">権限</dt>
    <dd>{% if user.is_admin %}管理者{% else %}一般ユーザー{% endif %}</dd>
    {% if user.groups %}
    <dt class="font-semibold text-slate-600">グループ</dt>
    <dd>{{ user.groups | join(", ") }}</dd>
    {% endif %}
  </dl>

  <div class="mt-6 space-y-2">
    <a href="/account/password" class="block rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm hover:bg-slate-50">
      パスワード変更
    </a>
  </div>

  <div class="mt-6 flex justify-end">
    <form method="post" action="/logout" class="inline">
      <button type="submit" class="rounded border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100">
        ログアウト
      </button>
    </form>
  </div>
</div>
{% endblock %}
