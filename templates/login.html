{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="text-2xl font-semibold">ログイン</h1>
  <p class="mt-1 text-sm text-slate-600">ユーザー名とパスワードを入力してください。</p>

  {% if errors %}
  <div class="mt-4 rounded border border-rose-300 bg-rose-50 p-3 text-sm text-rose-700">
    <ul class="list-disc space-y-1 pl-5">
      {% for error in errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}

  <form method="post" action="/login" class="mt-6 space-y-4 rounded-lg border border-slate-200 bg-white p-6">
    <input type="hidden" name="next" value="{{ next }}" />
    <div>
      <label class="text-xs font-semibold text-slate-600" for="username">ユーザー名</label>
      <input id="username" name="username" value="{{ username }}" required autofocus
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-600" for="password">パスワード</label>
      <input id="password" name="password" type="password" required
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div class="flex justify-end">
      <button type="submit" class="rounded bg-slate-900 px-4 py-2 text-sm font-semibold text-white">
        ログイン
      </button>
    </div>
  </form>
</div>
{% endblock %}
